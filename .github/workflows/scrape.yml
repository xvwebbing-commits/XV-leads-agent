name: Nightly Lead Scrape

on:
  schedule:
    # Every Monday at 1:00 AM Eastern (06:00 UTC). Change 1 to another day (0=Sun, 2=Tue...).
    - cron: '0 6 * * 1'
  workflow_dispatch:  # lets you run it manually from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Google Maps scraper
        run: go install github.com/gosom/google-maps-scraper@latest

      - name: Shuffle queries for variety
        run: |
          python3 -c "
          import random
          with open('queries.txt') as f:
              lines = [l.strip() for l in f if l.strip()]
          random.shuffle(lines)
          subset = lines[:10]
          with open('queries_run.txt', 'w') as f:
              f.write('\n'.join(subset) + '\n')
          print('This run will search:', subset)
          "

      - name: Run scraper
        run: |
          $(go env GOPATH)/bin/google-maps-scraper \
            -input queries_run.txt \
            -results results.csv \
            -exit-on-inactivity 5m \
            -depth 5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Push leads to Google Sheet
        id: push
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
        run: python push_to_sheets.py results.csv

      - name: Score leads and find emails
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
        run: python email_leads.py

      - name: Notify Slack (success)
        if: success() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NEW_LEADS: ${{ steps.push.outputs.new_leads }}
          SKIPPED_SITE: ${{ steps.push.outputs.skipped_has_site }}
          SKIPPED_DUP: ${{ steps.push.outputs.skipped_dup }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\":robot_face: *Nightly Lead Scrape complete* — ${NEW_LEADS} new leads added to sheet. (skipped ${SKIPPED_SITE} with sites, ${SKIPPED_DUP} duplicates) <${RUN_URL}|View run>\"}" \
            "$SLACK_WEBHOOK_URL"

      - name: Notify Slack (failure)
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\":x: *Lead scrape failed* — <${RUN_URL}|view logs>\"}" \
            "$SLACK_WEBHOOK_URL"

      - name: Upload raw CSV as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raw-results
          path: results.csv
          retention-days: 14
